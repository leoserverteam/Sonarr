services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}       
      - PGID=${PGID}  
      - TZ=Asia/Yekaterinburg
    volumes:
      - ./sonarr/config:/config
      - ${LOAD_PATH}:/downloads  
      - ${MEDIA_PATH}:/tv
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - hcp-network

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}       
      - PGID=${PGID}  
      - TZ=Asia/Yekaterinburg
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - hcp-network

networks:
  hcp-network:
    external: true

